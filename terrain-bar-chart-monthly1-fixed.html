<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>秦岭地形图与月度碳汇3D柱状图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a1931, #1a3c79);
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        h1 { font-size: 1.1rem; margin-bottom: 2px; color: #00dbde; }
        .subtitle { font-size: 0.75rem; opacity: 0.85; line-height: 1.3; }
        .month-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .year-month { display: flex; gap: 4px; align-items: center; }
        .month-selector label { font-size: 0.8rem; opacity: 0.9; }
        select {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .toggle-btn {
            background: linear-gradient(135deg, #00dbde, #fc00ff);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .toggle-btn:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(0, 219, 222, 0.5); }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
            justify-content: center;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
            text-align: center;
            flex: 1;
        }
        .stat-title { font-size: 0.75rem; opacity: 0.8; margin-bottom: 2px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: #00dbde; }
        .legend {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 6px 0;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; }
        .legend-color {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .map-container {
            width: 100%;
            height: 55vh;
            min-height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #map { width: 100%; height: 100%; }
        .info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.75rem;
            opacity: 0.8;
            text-align: center;
            line-height: 1.5;
        }
        .loading-tip {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }
        .loading-text { color: #00dbde; font-size: 1rem; margin-top: 16px; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>秦岭地形图与月度碳汇柱状图</h1>
            <div class="subtitle">底图为秦岭地形轮廓，上层为各县区碳汇值柱状图，支持按年月切换数据</div>
        </header>

        <div class="month-selector">
            <div class="year-month">
                <label for="yearSelect">年份:</label>
                <select id="yearSelect">
                    <option value="2012">2012</option>
                    <option value="2013">2013</option>
                    <option value="2014">2014</option>
                    <option value="2015">2015</option>
                    <option value="2016">2016</option>
                    <option value="2017">2017</option>
                    <option value="2018">2018</option>
                    <option value="2019">2019</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022" selected>2022</option>
                </select>
            </div>
            <div class="year-month">
                <label for="monthSelect">月份:</label>
                <select id="monthSelect">
                    <option value="1">1月</option>
                    <option value="2">2月</option>
                    <option value="3">3月</option>
                    <option value="4">4月</option>
                    <option value="5">5月</option>
                    <option value="6">6月</option>
                    <option value="7">7月</option>
                    <option value="8">8月</option>
                    <option value="9">9月</option>
                    <option value="10">10月</option>
                    <option value="11">11月</option>
                    <option value="12">12月</option>
                </select>
            </div>
            <button id="updateBtn" class="toggle-btn">更新图表</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-title">县区数量</div>
                <div class="stat-value" id="data-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">平均碳汇值</div>
                <div class="stat-value" id="mean-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最高碳汇值</div>
                <div class="stat-value" id="max-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最低碳汇值</div>
                <div class="stat-value" id="min-value">-</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ff6666;"></div>
                <span>碳源/负值</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ffcc00;"></div>
                <span>低碳汇</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #66ff66;"></div>
                <span>高碳汇</span>
            </div>
        </div>

        <div class="map-container">
            <div id="map">
                <div id="loading" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #00dbde; font-size: 14px;">
                    <div style="margin-bottom: 16px;">正在加载秦岭地形与碳汇数据...</div>
                    <div style="width: 40px; height: 40px; border: 4px solid rgba(0, 219, 222, 0.3); border-top: 4px solid #00dbde; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <div id="loading-details" style="margin-top: 16px; font-size: 12px; opacity: 0.8;"></div>
                </div>
                <div id="error" style="display: none; padding: 30px; text-align: center; color: #ff6666;">
                    <h3 style="margin-bottom: 12px;">地图加载失败</h3>
                    <p id="error-message" style="margin-bottom: 16px;"></p>
                    <button id="retry-btn" style="background: #00dbde; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">重试加载</button>
                </div>
            </div>
        </div>

        <div class="info">
            <p>蓝色区域：秦岭县区边界 | 彩色柱状条：碳汇值（红→碳源/负值，黄→低碳汇，绿→高碳汇）</p>
            <p>使用年份和月份选择器切换不同时期的数据，点击"更新图表"按钮刷新显示。</p>
        </div>
    </div>

    <script>
    // 全局变量
    let currentChart = null;
    let countyCoordinates = {};
    let monthlyCarbonData = {};
    let currentYear = '2022';
    let currentMonth = '1';

    // 颜色辅助函数
    function lightenColor(color, percent) {
        const num = parseInt(color.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) + amt;
        const G = (num >> 8 & 0x00FF) + amt;
        const B = (num & 0x0000FF) + amt;
        return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
    }

    function darkenColor(color, percent) {
        const num = parseInt(color.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) - amt;
        const G = (num >> 8 & 0x00FF) - amt;
        const B = (num & 0x0000FF) - amt;
        return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
    }

    // UI 状态
    function showLoading(message) {
        message = message || '正在加载秦岭地形与碳汇数据...';
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const detailsEl = document.getElementById('loading-details');
        if (loadingEl) loadingEl.style.display = 'flex';
        if (errorEl) errorEl.style.display = 'none';
        if (detailsEl) detailsEl.textContent = message;
    }

    function hideLoading() {
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.style.display = 'none';
    }

    function showError(message) {
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMsgEl = document.getElementById('error-message');
        if (loadingEl) loadingEl.style.display = 'none';
        if (errorEl) errorEl.style.display = 'block';
        if (errorMsgEl) errorMsgEl.innerHTML = message;
    }

    // 重试按钮
    function setupRetryButton() {
        const retryBtn = document.getElementById('retry-btn');
        if (retryBtn) {
            retryBtn.onclick = function() {
                showLoading('正在重新加载数据...');
                setTimeout(function() { initMap(); }, 300);
            };
        }
    }

    // 控件设置
    function setupControls() {
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const updateBtn = document.getElementById('updateBtn');

        if (yearSelect) {
            yearSelect.addEventListener('change', function() { currentYear = this.value; });
            yearSelect.value = currentYear;
        }
        if (monthSelect) {
            monthSelect.addEventListener('change', function() { currentMonth = this.value; });
            monthSelect.value = currentMonth;
        }
        if (updateBtn) {
            updateBtn.addEventListener('click', function() {
                if (currentChart) updateChartWithMonthlyData();
            });
        }
    }

    // 更新统计
    function updateStats(stats) {
        document.getElementById('data-count').textContent = stats.countyCount;
        document.getElementById('mean-value').textContent = stats.meanValue.toFixed(2);
        document.getElementById('max-value').textContent = stats.maxValue.toFixed(2);
        document.getElementById('min-value').textContent = stats.minValue.toFixed(2);
    }

    // 初始化地图
    function initMap() {
        showLoading('正在初始化地图...');
        if (currentChart) { currentChart.dispose(); currentChart = null; }
        if (typeof echarts === 'undefined') { showError('ECharts库未加载！请检查网络连接'); return; }
        const chartDom = document.getElementById('map');
        if (!chartDom) { showError('找不到地图容器'); return; }
        try {
            var myChart = echarts.init(chartDom);
            currentChart = myChart;
        } catch (error) {
            showError('ECharts初始化失败: ' + error.message);
            return;
        }
        init2DMap(myChart);
        window.addEventListener('resize', function() { myChart.resize(); });
    }

    // 初始化2D地图
    function init2DMap(chart) {
        var option = {
            backgroundColor: 'transparent',
            title: { show: false },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    if (params.seriesType === 'scatter') {
                        var data = params.data;
                        var name = data.name || '未知';
                        var carbon = (data.value && data.value.length > 2) ? data.value[2].toFixed(2) : '无数据';
                        return '<strong>' + name + '</strong><br/>碳汇值: <b>' + carbon + '</b>';
                    } else {
                        var countyName = params.name;
                        var yearData = monthlyCarbonData[currentYear];
                        var monthData = yearData ? yearData[currentMonth] : null;
                        var carbonValue = '无数据';
                        if (monthData && monthData[countyName] !== undefined) carbonValue = monthData[countyName].toFixed(2);
                        return '<strong>' + countyName + '</strong><br/>碳汇值: <b>' + carbonValue + '</b>';
                    }
                },
                backgroundColor: 'rgba(0,0,0,0.8)',
                textStyle: { color: '#fff' }
            },
            visualMap: { show: false }
        };
        try { chart.setOption(option); } catch (e) { chart.setOption({ backgroundColor: 'transparent' }); }
        loadGeoJSON(chart);
    }

    // 加载GeoJSON
    async function loadGeoJSON(chart) {
        showLoading('正在加载秦岭地形数据...');
        try {
            var geoJSON = await fetch('qinling.geojson').then(function(r) { return r.json(); });
            if (geoJSON.crs) delete geoJSON.crs;
            geoJSON.features.forEach(function(feature) {
                if (feature.properties && feature.properties.NAME && !feature.properties.name) {
                    feature.properties.name = feature.properties.NAME;
                }
            });
            echarts.registerMap('qinling', geoJSON, { nameProperty: 'name' });
            chart.setOption({
                geo: {
                    map: 'qinling',
                    center: [108.5, 34.2],
                    zoom: 1.2,
                    scaleLimit: { min: 0.8, max: 3 },
                    top: '10%',
                    itemStyle: {
                        areaColor: '#e8f4ff',
                        borderColor: '#b3d9ff',
                        borderWidth: 0.5,
                        shadowColor: 'rgba(100, 150, 255, 0.3)',
                        shadowBlur: 5,
                        shadowOffsetX: 2,
                        shadowOffsetY: 2
                    },
                    tooltip: {
                        show: true,
                        formatter: function(params) {
                            var countyName = params.name;
                            var yearData = monthlyCarbonData[currentYear];
                            var monthData = yearData ? yearData[currentMonth] : null;
                            var carbonValue = '无数据';
                            if (monthData && monthData[countyName] !== undefined) carbonValue = monthData[countyName].toFixed(2);
                            return '<strong>' + countyName + '</strong><br/>碳汇值: <b>' + carbonValue + '</b>';
                        },
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        textStyle: { color: '#fff' }
                    },
                    emphasis: { itemStyle: { areaColor: '#3a9ef9' }, label: { show: false } },
                    roam: true,
                    label: { show: false }
                }
            });
            showLoading('地形图加载成功，正在加载数据...');
            await Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()]);
            await loadCurrentMonthData(chart);
            hideLoading();
        } catch (error) {
            console.error('加载失败:', error);
            createFallbackMap(chart);
        }
    }

    // 加载县区坐标
    async function loadCountyCoordinates() {
        try {
            var data = await fetch('map3d_sampled.json').then(function(r) { return r.json(); });
            countyCoordinates = {};
            if (data.features && Array.isArray(data.features)) {
                data.features.forEach(function(feature) {
                    if (feature.name && feature.center && Array.isArray(feature.center) && feature.center.length >= 2) {
                        countyCoordinates[feature.name] = [feature.center[0], feature.center[1]];
                    }
                });
            }
        } catch (error) {
            console.error('加载坐标数据失败:', error);
            countyCoordinates = {
                "宁陕县": [108.44010930177312, 33.53151179528448],
                "丹凤县": [110.43133507960304, 33.67967447584821],
                "柞水县": [109.27342486656763, 33.68234258606788],
                "长安区": [108.94751031794558, 34.16420212456797],
                "鄠邑区": [108.60558057412175, 34.11160938183645],
                "蓝田县": [109.31746211707544, 34.15624502339996],
                "周至县": [108.2224902417701, 34.16420212456797],
                "太白县": [107.31953691254175, 34.05924480890543],
                "商州区": [109.93765491183952, 33.87061739333576],
                "洛南县": [110.14573240586154, 34.09180968297678]
            };
        }
    }

    // 加载月度碳汇数据
    async function loadMonthlyCarbonData() {
        try {
            monthlyCarbonData = await fetch('carbonData2.json').then(function(r) { return r.json(); });
        } catch (error) {
            console.error('加载月度数据失败:', error);
            monthlyCarbonData = { "2022": { "1": { "宁陕县": 150, "丹凤县": 200, "柞水县": 180 } } };
        }
    }

    // 加载当前月份数据
    async function loadCurrentMonthData(chart) {
        try {
            if (!monthlyCarbonData[currentYear] || !monthlyCarbonData[currentYear][currentMonth]) {
                var years = Object.keys(monthlyCarbonData);
                if (years.length > 0) {
                    var months = Object.keys(monthlyCarbonData[years[0]]);
                    if (months.length > 0) {
                        currentYear = years[0];
                        currentMonth = months[0];
                        document.getElementById('yearSelect').value = currentYear;
                        document.getElementById('monthSelect').value = currentMonth;
                    }
                }
            }
            var monthData = monthlyCarbonData[currentYear][currentMonth];
            var chartData = [];
            var totalCarbon = 0, maxCarbon = -Infinity, minCarbon = Infinity, countyCount = 0;
            for (var countyName in countyCoordinates) {
                if (monthData[countyName] !== undefined) {
                    var carbonValue = monthData[countyName];
                    var coords = countyCoordinates[countyName];
                    chartData.push({ name: countyName, value: [coords[0], coords[1], carbonValue], carbon: carbonValue });
                    totalCarbon += carbonValue;
                    if (carbonValue > maxCarbon) maxCarbon = carbonValue;
                    if (carbonValue < minCarbon) minCarbon = carbonValue;
                    countyCount++;
                }
            }
            var meanCarbon = countyCount > 0 ? totalCarbon / countyCount : 0;
            updateStats({ countyCount: countyCount, meanValue: meanCarbon, maxValue: maxCarbon, minValue: minCarbon });
            display2DData(chart, chartData);
        } catch (error) {
            console.error('加载月份数据失败:', error);
            showError('加载数据失败: ' + error.message);
        }
    }

    // 更新图表
    function updateChartWithMonthlyData() {
        if (!currentChart) return;
        showLoading('正在加载 ' + currentYear + '年' + currentMonth + '月数据...');
        loadCurrentMonthData(currentChart).then(function() { hideLoading(); }).catch(function() { hideLoading(); });
    }

    // 显示2D数据
    function display2DData(chart, data) {
        var barData = data.map(function(item) { return { name: item.name, value: item.value }; });
        chart.setOption({
            series: [{
                type: 'scatter',
                coordinateSystem: 'geo',
                data: barData,
                symbol: 'path://M0,0 L1,0 L1,1 L0,1 Z',
                symbolSize: function(val) {
                    var h = Math.max(5, Math.min(40, Math.abs(val[2]) / 10));
                    return [8, h];
                },
                symbolOffset: function(val) {
                    var h = Math.max(5, Math.min(40, Math.abs(val[2]) / 10));
                    return [0, -h / 2];
                },
                itemStyle: {
                    color: function(params) {
                        var val = params.data.value[2];
                        var baseColor;
                        if (val <= 0) baseColor = '#ff6666';
                        else if (val < 100) baseColor = '#ffcc00';
                        else if (val < 250) baseColor = '#66ff66';
                        else baseColor = '#00cc66';
                        return {
                            type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: lightenColor(baseColor, 30) },
                                { offset: 0.7, color: baseColor },
                                { offset: 1, color: darkenColor(baseColor, 30) }
                            ]
                        };
                    },
                    opacity: 0.95,
                    borderColor: '#ffffff',
                    borderWidth: 0.5,
                    shadowBlur: 6,
                    shadowColor: 'rgba(0, 0, 0, 0.4)',
                    shadowOffsetX: 1,
                    shadowOffsetY: 2
                },
                emphasis: {
                    itemStyle: { borderColor: '#fff', borderWidth: 2, shadowBlur: 8, shadowColor: 'rgba(0, 255, 255, 0.6)' }
                },
                zlevel: 2,
                label: { show: false }
            }]
        });
    }

    // 备用地图
    function createFallbackMap(chart) {
        var fallbackGeoJSON = {
            type: "FeatureCollection",
            features: [{ type: "Feature", properties: { name: "秦岭区域" }, geometry: { type: "Polygon", coordinates: [[[105, 32], [111, 32], [111, 35], [105, 35], [105, 32]]] } }]
        };
        try {
            echarts.registerMap('qinling', fallbackGeoJSON);
            chart.setOption({
                geo: {
                    map: 'qinling', center: [108.5, 34.2], zoom: 1.3,
                    itemStyle: { areaColor: '#e8f4ff', borderColor: '#b3d9ff', borderWidth: 0.5 },
                    roam: true, label: { show: false }
                }
            });
            Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()]).then(function() {
                return loadCurrentMonthData(chart);
            }).then(function() { hideLoading(); }).catch(function() { hideLoading(); });
        } catch (error) {
            showError('地图加载失败');
            hideLoading();
        }
    }

    // 页面加载
    window.addEventListener('load', function() {
        setupRetryButton();
        setupControls();
        initMap();
    });
    </script>
</body>
</html>
